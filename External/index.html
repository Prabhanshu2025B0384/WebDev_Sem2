<!DOCTYPE html>
<html>
<head>
    <title>Armstrong Number Checker</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="box">
        <div class="container">
            <h2>Armstrong Number Checker</h2>
            <input type="number" id="num" placeholder="Enter the Number">
            <button onclick="checkArmstrongNumber()" class="but">Check</button>
            <p id="result"></p>
        </div>
    </div>
    <script>
        function checkArmstrongNumber() {
            let original = document.getElementById("num").value;
            let digits = original.length;
            let sum = 0;
            for (let i = 0; i < digits; i++) {
                sum += Math.pow(Number(original[i]), digits);
            }
            if (sum === Number(original)) {
                document.getElementById("result").innerHTML =original + " is an Armstrong Number";
            } else {
                document.getElementById("result").innerHTML =original + " is NOT an Armstrong Number";
            }
        }
    </script>
</body>
</html>
