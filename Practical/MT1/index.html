<!DOCTYPE html>
<html lang="en">
<head>
    <title>Temperature Conversion</title>
    <style>
        body{
            background-color: aliceblue;
           
        }
       button{
        background-color: hsl(240, 79%, 59%);
        padding: 15px;
        border-radius: 10px;
        margin-top: 40px;
       }
       button:hover{
        background-color: hsl(240, 81%, 69%);
        cursor: pointer;
       }
       .container{
        display:flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
       }
       #result{
        margin-top: 40px;
        height: 100px;
        width: 100px;
        background-color: rgb(104, 203, 58);
        border-radius: 15px;
        color: black;
        text-align: center;
       }
     
    </style>
</head>
<body>
    
    <div class="container">
        <h1>Convert Temperature To Farhenheit </h1>
        <input id="in" placeholder="Type temp in Celsius" type="number">
        <button onclick="tempConv()">Convert</button>
        <div id="result">
            Result will show here
        </div>
    </div>
    
    <script>
        function tempConv(){
            let cels=(Number)(document.getElementById("in").value);
            let farhen=(cels*(9/5))+32;
            document.getElementById("result").innerHTML=cels+" C="+farhen+" Farhenheit";
        }
    </script>
</body>
</html>
